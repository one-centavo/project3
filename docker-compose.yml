services:
    # Web Server
    web:
        container_name: proyecto3-nginx
        image: nginx:alpine
        deploy:
            resources:
                limits:
                    memory: 128M
                reservations:
                    memory: 64M
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - proyecto3_public_assets:/var/www/html/public
        depends_on:
            - app
        networks:
            - proyecto3-network
            - proxy-network
        restart: always

    # Laravel Application
    app:
        container_name: proyecto3-app
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            args:
                user: laravel_user
                uid: ${UID:-1000}
        deploy:
            resources:
                limits:
                    memory: 1G
                reservations:
                    memory: 512M
        volumes:
            - proyecto3_public_assets:/var/www/html/public
            - ./.env:/var/www/html/.env
        networks:
            - proyecto3-network
            - proxy-network
        restart: always

    # Database
    db:
        container_name: proyecto3-mysql
        image: mysql:8.0
        deploy:
            resources:
                limits:
                    memory: 1G
                reservations:
                    memory: 512M
        restart: always
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - proyecto3_db_data:/var/lib/mysql
        networks:
            - proyecto3-network

networks:
    proyecto3-network:
        driver: bridge
    proxy-network:
        external: true

volumes:
    proyecto3_db_data:
    proyecto3_public_assets:
